name: flutter_amazon_clone_bloc
description: Amazon Clone application with Clean Architecture and BLoC pattern
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  hydrated_bloc: ^9.1.2
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.1.1
  
  # Network & Storage
  http: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # UI Components
  cached_network_image: ^3.3.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  dotted_border: ^2.1.0
  
  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  
  # File & Media
  file_picker: ^6.0.0
  camera_camera: ^3.0.0
  cloudinary_public: ^0.21.0
  speech_to_text: ^6.6.0
  
  # Payment
  pay: ^1.1.2
  
  # Charts
  syncfusion_flutter_charts: ^26.2.9
  
  # Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.2
  firebase_core: ^2.24.2
  
  # AR & 3D
  arcore_flutter_plugin: ^0.1.0
  arkit_plugin: ^0.1.0
  model_viewer: ^1.2.0
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/category_images/
    - assets/images/bottom_offers/
    - assets/images/bottom_nav_bar/
    - assets/images/product_quality_icons/
    - assets/images/cart_screen_icons/
    - assets/applepay.json
    - assets/gpay.json
    - config.env

  fonts:
    - family: AmazonEmber
      fonts:
        - asset: assets/fonts/amazon_ember/AmazonEmber_Th.ttf
          weight: 100
        - asset: assets/fonts/amazon_ember/AmazonEmber_Lt.ttf
          weight: 200
        - asset: assets/fonts/amazon_ember/AmazonEmber_Rg.ttf
          weight: 400
        - asset: assets/fonts/amazon_ember/AmazonEmber_Medium.ttf
          weight: 500
        - asset: assets/fonts/amazon_ember/AmazonEmber_Bd.ttf
          weight: 700
        - asset: assets/fonts/amazon_ember/AmazonEmber_He.ttf
          weight: 900
